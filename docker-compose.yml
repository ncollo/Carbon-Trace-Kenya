version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: carbon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build: .
    command: python worker.py
    volumes:
      - ./:/app
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'rq.worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - WORKER_METRICS_PORT=8001
    ports:
      - "8001:8001"

volumes:
  pgdata:
