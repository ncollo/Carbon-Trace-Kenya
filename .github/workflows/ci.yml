name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: carbon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d carbon" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install root dependencies
        run: pip install -r requirements.txt

      - name: Install backend dependencies
        run: pip install -r carbontrace-backend/requirements.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U user -d carbon; do
            sleep 1
          done
        timeout-minutes: 1

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/carbon
        run: alembic upgrade head

      - name: Run tests
        env:
          PYTHONPATH: .:carbontrace-backend
        run: pytest -v --tb=short
