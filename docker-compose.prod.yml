version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: carbon
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  web:
    build: .
    command: uvicorn carbontrace-backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/carbon
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    command: python worker.py
    depends_on:
      - redis
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/carbon
      - REDIS_URL=redis://redis:6379/0
      - WORKER_METRICS_PORT=8001
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/metrics || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

  frontend:
    build: ./carbontrace
    ports:
      - "5173:5173"
    depends_on:
      - web
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  pgdata:
